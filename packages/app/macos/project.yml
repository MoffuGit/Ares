name: AresMac
options:
  bundleIdPrefix: com.ares
  deploymentTarget:
    macOS: "14.0"

targets:
  AresMac:
    type: application
    platform: macOS
    sources:
      - Sources/AresMac
    dependencies:
      - framework: AresKit.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ares.mac
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
